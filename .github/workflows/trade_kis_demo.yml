name: 무한매수법 실행 (KIS Demo)

# KIS 모의투자 계좌 실행
# GitHub Environment: kis-demo (secrets/variables 분리)
# 캐시 키: state-kis-demo-*

on:
  repository_dispatch:
    types:
      - trigger_trade_demo      # 기존 type (하위호환)
      - trigger_trade_kis_demo  # 신규 type
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택 (기본: LIVE)'
        required: false
        type: choice
        options:
          - DRY
          - LIVE
      symbols:
        description: '거래 심볼 (예: TQQQ:NAS,SOXL:AMS) — 비워두면 환경 변수 SYMBOLS 사용'
        required: false
        type: string

jobs:
  trade_kis_demo:
    uses: ./.github/workflows/trade_base.yml
    with:
      broker: kis
      broker_mode: demo
      trade_mode: ${{ github.event.inputs.trade_mode || github.event.client_payload.trade_mode || '' }}
      symbols: ${{ github.event.inputs.symbols || github.event.client_payload.symbols || '' }}

    secrets: inherit
