name: 무한매수법 실행 (Demo)

on:
  repository_dispatch:
    types: [trigger_trade_demo]
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택'
        required: false
        type: choice
        options:
          - DRY
          - LIVE
      symbols:
        description: '거래 심볼 (예: TQQQ:NAS,SOXL:AMS)'
        required: false
        type: string

jobs:
  trade_demo:
    uses: ./.github/workflows/trade_base.yml
    with:
      broker: kis
      broker_mode: demo
      trade_mode: ${{ github.event.inputs.trade_mode || github.event.client_payload.trade_mode || vars.TRADE_MODE_DEMO || 'DRY' }}
      # 복수 종목 사용 (우선순위: input.symbols -> vars.SYMBOLS -> base 기본값)
      symbols: ${{ github.event.inputs.symbols || github.event.client_payload.symbols || vars.SYMBOLS }}
      quiet_hours: ${{ vars.QUIET_HOURS_DEMO || 'true' }}
      commission_rate: ${{ vars.COMMISSION_RATE_DEMO || '0.0025' }}
      reinvest: ${{ vars.REINVEST_DEMO || 'true' }}
    secrets: inherit
