name: 자동매매 실행 (Demo)

on:
  schedule:
    # 데모(정규장 종료 약 2시간 전인 ET 13:57 트리거, DST 분리)
    - cron: '57 17 * 4-10 1-5'
    - cron: '57 18 * 11-12 1-5'
    - cron: '57 18 * 1-3 1-5'
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택'
        required: false
        type: choice
        options:
          - DRY
          - LIVE
      symbols:
        description: '거래 심볼 (예: TQQQ:NAS,SOXL:AMS)'
        required: false
        type: string

jobs:
  trade_demo:
    uses: ./.github/workflows/trade_base.yml
    with:
      trade_mode: ${{ github.event.inputs.trade_mode || vars.TRADE_MODE_DEMO }}
      kis_mode: demo
      # 데모 전용 기본값(우선순위: 호출자 inputs -> repo vars -> base defaults)
      symbols: ${{ github.event.inputs.symbols || vars.SYMBOLS }}
      symbol: ${{ vars.SYMBOL }}
      exchange: ${{ vars.EXCHANGE }}
      splits: ${{ vars.SPLITS }}
      take_profit: ${{ vars.TAKE_PROFIT }}
      big_buy_range: ${{ vars.BIG_BUY_RANGE }}
    secrets:
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY_DEMO }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET_DEMO }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO_DEMO }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
