name: 무한매수법 실행 (Demo)

on:
  repository_dispatch:
    types: [trigger_trade_demo]
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택'
        required: false
        type: choice
        options:
          - DRY
          - LIVE
      symbols:
        description: '거래 심볼 (예: TQQQ:NAS,SOXL:AMS)'
        required: false
        type: string

jobs:
  trade_demo:
    uses: ./.github/workflows/trade_base.yml
    with:
      trade_mode: ${{ github.event.inputs.trade_mode || github.event.client_payload.trade_mode || vars.TRADE_MODE_DEMO }}
      kis_mode: demo
      # 데모 전용 기본값(우선순위: 호출자 inputs -> repo vars -> base defaults)
      symbols: ${{ github.event.inputs.symbols || github.event.client_payload.symbols || vars.SYMBOLS }}
      quiet_hours: ${{ vars.QUIET_HOURS_DEMO || 'true' }}
      commission_rate: ${{ vars.COMMISSION_RATE_DEMO || '0.0025' }}
      reinvest: ${{ vars.REINVEST_DEMO || 'false' }}
    secrets:
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY_DEMO }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET_DEMO }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO_DEMO }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_DEMO }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_DEMO }}
