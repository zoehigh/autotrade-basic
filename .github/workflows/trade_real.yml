name: 무한매수법 실행 (Real)

on:
  repository_dispatch:
    types: [trigger_trade_real]
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택'
        required: false
        type: choice
        options:
          - DRY
          - LIVE
      symbols:
        description: '거래 심볼 (예: TQQQ:NAS,SOXL:AMS)'
        required: false
        type: string

jobs:
  trade:
    uses: ./.github/workflows/trade_base.yml
    with:
      trade_mode: ${{ github.event.inputs.trade_mode || github.event.client_payload.trade_mode || vars.TRADE_MODE }}
      kis_mode: real
      # 복수 종목 사용 (우선순위: input.symbols -> vars.SYMBOLS -> base 기본값)
      symbols: ${{ github.event.inputs.symbols || github.event.client_payload.symbols || vars.SYMBOLS }}
      quiet_hours: ${{ vars.QUIET_HOURS_REAL || 'false' }}
      commission_rate: ${{ vars.COMMISSION_RATE_REAL || '0.0025' }}
      reinvest: ${{ vars.REINVEST_REAL || 'false' }}
    secrets:
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_REAL }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_REAL }}
