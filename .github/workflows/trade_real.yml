name: 자동매매 실행 (Real)

on:
  schedule:
    # 프리마켓 진입(ET 04:00) 후 얼추 시작되도록 트리거 - DST 분리
    - cron: '31 7 * 4-10 1-5'
    - cron: '31 8 * 11-12 1-5'
    - cron: '31 8 * 1-3 1-5'
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택'
        required: false
        type: choice
        options:
          - DRY
          - LIVE
      symbols:
        description: '거래 심볼 (예: TQQQ:NAS,SOXL:AMS)'
        required: false
        type: string

jobs:
  trade:
    uses: ./.github/workflows/trade_base.yml
    with:
      trade_mode: ${{ github.event.inputs.trade_mode || vars.TRADE_MODE }}
      kis_mode: real
      # 복수 종목 사용 (우선순위: input.symbols -> vars.SYMBOLS -> base 기본값)
      symbols: ${{ github.event.inputs.symbols || vars.SYMBOLS }}
    secrets:
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
