name: 무한매수법 실행 (Kiwoom Demo)

# 키움증권 모의투자 계좌 실행
# GitHub Environment: kiwoom-demo (secrets/variables 분리)
# 캐시 키: state-kiwoom-demo-*
# 주의: SOXL은 키움에서 NYSE 상장 → SYMBOLS=TQQQ:NAS,SOXL:NYS (AMS 아님)

on:
  repository_dispatch:
    types:
      - trigger_trade_kiwoom_demo
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택 (기본: LIVE)'
        required: false
        type: choice
        options:
          - DRY
          - LIVE
      symbols:
        description: '거래 심볼 (예: TQQQ:NAS,SOXL:NYS) — 비워두면 환경 변수 SYMBOLS 사용'
        required: false
        type: string

jobs:
  trade_kiwoom_demo:
    uses: ./.github/workflows/trade_base.yml
    with:
      broker: kiwoom
      broker_mode: demo
      trade_mode: ${{ github.event.inputs.trade_mode || github.event.client_payload.trade_mode || '' }}
      symbols: ${{ github.event.inputs.symbols || github.event.client_payload.symbols || '' }}
      quiet_hours: ${{ '' }}
      commission_rate: ${{ '' }}
      reinvest: ${{ '' }}
    secrets: inherit
