name: Reusable 무한매수법 베이스

on:
  workflow_call:
    inputs:
      broker:
        description: '증권사 (kis, kiwoom, ls, toss)'
        required: false
        type: string
        default: kis
      broker_mode:
        description: '브로커 모드 (demo or real)'
        required: false
        type: string
        default: demo
      trade_mode:
        description: '거래 모드 (DRY or LIVE)'
        required: false
        type: string
      symbols:
        description: '투자 심볼 (예: TQQQ:NAS,SOXL:AMS)'
        required: false
        type: string
      quiet_hours:
        description: '조용한 시간대 기능 (true/false)'
        required: false
        type: string
      commission_rate:
        description: '수수료율 (예: 0.0025)'
        required: false
        type: string
      reinvest:
        description: '복리 재투자 활성화 (true/false)'
        required: false
        type: string
    secrets:
      # KIS secrets (broker=kis 일 때만 사용됨)
      KIS_APP_KEY:
        required: false
      KIS_APP_SECRET:
        required: false
      KIS_ACCOUNT_NO:
        required: false
      # 키움 secrets (broker=kiwoom 일 때만 사용됨)
      KIWOOM_APP_KEY:
        required: false
      KIWOOM_APP_SECRET:
        required: false
      KIWOOM_ACCOUNT_NO:
        required: false
      # 공통 secrets
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

jobs:
  run-trade:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 설정
        run: uv python install

      - name: 의존성 설치
        run: uv sync

      - name: state 캐시 복원
        # 이전 실행에서 저장한 .state.json을 불러옵니다.
        # T값, 사이클 시작일, 복리 시드 등 API로 복구할 수 없는 정보가 담겨 있습니다.
        id: state-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .state.json
          key: state-${{ inputs.broker || 'kis' }}-${{ inputs.broker_mode || 'demo' }}-${{ github.run_id }}
          restore-keys: |
            state-${{ inputs.broker || 'kis' }}-${{ inputs.broker_mode || 'demo' }}-

      - name: Resolve and log inputs
        run: |
          echo "Resolved BROKER=${{ inputs.broker || 'kis' }}"
          echo "Resolved BROKER_MODE=${{ inputs.broker_mode || 'demo' }}"
          echo "Resolved TRADE_MODE=${{ inputs.trade_mode || 'DRY' }}"
          echo "Resolved SYMBOLS=${{ inputs.symbols || 'TQQQ:NAS,SOXL:AMS' }}"

      - name: 자동매매 봇 실행
        env:
          # 브로커 설정 (일반화)
          BROKER: ${{ inputs.broker || 'kis' }}
          BROKER_MODE: ${{ inputs.broker_mode || 'demo' }}

          # KIS 인증정보 (broker=kis 일 때만 사용됨)
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}

          # 키움 인증정보 (broker=kiwoom 일 때만 사용됨)
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_APP_SECRET: ${{ secrets.KIWOOM_APP_SECRET }}
          KIWOOM_ACCOUNT_NO: ${{ secrets.KIWOOM_ACCOUNT_NO }}

          # 런타임 설정: inputs -> repo vars -> 하드코딩 기본값 순으로 폴백
          TRADE_MODE: ${{ inputs.trade_mode || vars.TRADE_MODE || 'DRY' }}
          # 복수 종목 사용
          SYMBOLS: ${{ inputs.symbols || 'TQQQ:NAS,SOXL:AMS' }}

          # 종목별 세부 설정
          TQQQ_SPLITS: ${{ vars.TQQQ_SPLITS }}
          TQQQ_SYMBOL_TYPE: ${{ vars.TQQQ_SYMBOL_TYPE }}
          TQQQ_SEED: ${{ vars.TQQQ_SEED }}

          SOXL_SPLITS: ${{ vars.SOXL_SPLITS }}
          SOXL_SYMBOL_TYPE: ${{ vars.SOXL_SYMBOL_TYPE }}
          SOXL_SEED: ${{ vars.SOXL_SEED }}

          QUIET_HOURS: ${{ inputs.quiet_hours }}
          COMMISSION_RATE: ${{ inputs.commission_rate }}
          REINVEST: ${{ inputs.reinvest }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # API 연결 타임아웃 (초 단위, 기본값 30초)
          CONNECT_TIMEOUT: 30

          # GitHub Actions에서 Python 출력이 line-by-line으로 표시되도록 버퍼링 해제
          PYTHONUNBUFFERED: 1

        run: uv run python trading_bot.py

      - name: state 캐시 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .state.json
          key: state-${{ inputs.broker || 'kis' }}-${{ inputs.broker_mode || 'demo' }}-${{ github.run_id }}
