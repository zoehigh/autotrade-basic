name: Reusable 무한매수법 베이스

on:
  workflow_call:
    inputs:
      trade_mode:
        description: '거래 모드 (DRY or LIVE)'
        required: false
        type: string
      kis_mode:
        description: 'KIS 모드 (demo or real)'
        required: false
        type: string
      symbols:
        description: '투자 심볼 (예: TQQQ:NAS,SOXL:AMS)'
        required: false
        type: string
      quiet_hours:
        description: '조용한 시간대 기능 (true/false)'
        required: false
        type: string
      commission_rate:
        description: '수수료율 (예: 0.0025)'
        required: false
        type: string
      reinvest:
        description: '복리 재투자 활성화 (true/false)'
        required: false
        type: string
    secrets:
      KIS_APP_KEY:
        required: true
      KIS_APP_SECRET:
        required: true
      KIS_ACCOUNT_NO:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

jobs:
  run-trade:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 설정
        run: uv python install

      - name: 의존성 설치
        run: uv sync

      - name: state 캐시 복원
        # 이전 실행에서 저장한 .state.json을 불러옵니다.
        # T값, 사이클 시작일, 복리 시드 등 KIS API로 복구할 수 없는 정보가 담겨 있습니다.
        id: state-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .state.json
          key: state-${{ inputs.kis_mode || 'default' }}-${{ github.run_id }}
          restore-keys: |
            state-${{ inputs.kis_mode || 'default' }}-

      - name: state 캐시 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .state.json
          key: state-${{ inputs.kis_mode || 'default' }}-${{ github.run_id }}

      - name: Resolve and log inputs
        run: |
          echo "Resolved TRADE_MODE=${{ inputs.trade_mode || 'DRY' }}"
          echo "Resolved KIS_MODE=${{ inputs.kis_mode || 'demo' }}"
          echo "Resolved SYMBOLS=${{ inputs.symbols || 'TQQQ:NAS,SOXL:AMS' }}"

      - name: 자동매매 봇 실행
        env:
          # KIS 인증정보 (reusable workflow는 호출자에서 secrets을 주입받습니다)
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          # 계좌 정보는 호출자에서 주입받은 값을 사용합니다.
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}

          # 런타임 설정: inputs -> repo vars -> 하드코딩 기본값 순으로 폴백
          KIS_MODE: ${{ inputs.kis_mode || vars.KIS_MODE || 'demo' }}
          TRADE_MODE: ${{ inputs.trade_mode || vars.TRADE_MODE || 'DRY' }}
          # 복수 종목 사용
          SYMBOLS: ${{ inputs.symbols || 'TQQQ:NAS,SOXL:AMS' }}

          # 종목별 세부 설정
          TQQQ_SPLITS: ${{ vars.TQQQ_SPLITS }}
          TQQQ_SYMBOL_TYPE: ${{ vars.TQQQ_SYMBOL_TYPE }}
          TQQQ_SEED: ${{ vars.TQQQ_SEED }}

          SOXL_SPLITS: ${{ vars.SOXL_SPLITS }}
          SOXL_SYMBOL_TYPE: ${{ vars.SOXL_SYMBOL_TYPE }}
          SOXL_SEED: ${{ vars.SOXL_SEED }}

          QUIET_HOURS: ${{ inputs.quiet_hours }}
          COMMISSION_RATE: ${{ inputs.commission_rate }}
          REINVEST: ${{ inputs.reinvest }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: uv run python trading_bot.py


