name: Reusable 무한매수법 베이스

on:
  workflow_call:
    inputs:
      broker:
        description: '증권사 (kis, kiwoom, ls, toss)'
        required: false
        type: string
        default: kis
      broker_mode:
        description: '브로커 모드 (demo or real)'
        required: false
        type: string
        default: demo
      trade_mode:
        description: '거래 모드 (DRY or LIVE) — 비워두면 환경 변수 TRADE_MODE 사용'
        required: false
        type: string
      symbols:
        description: '투자 심볼 (예: TQQQ:NAS,SOXL:AMS) — 비워두면 환경 변수 SYMBOLS 사용'
        required: false
        type: string
      quiet_hours:
        description: '조용한 시간대 기능 (true/false) — 비워두면 환경 변수 QUIET_HOURS 사용'
        required: false
        type: string
      commission_rate:
        description: '수수료율 (예: 0.0025) — 비워두면 환경 변수 COMMISSION_RATE 사용'
        required: false
        type: string
      reinvest:
        description: '복리 재투자 활성화 (true/false) — 비워두면 환경 변수 REINVEST 사용'
        required: false
        type: string
    secrets:
      # KIS secrets (broker=kis 일 때만 사용됨)
      KIS_APP_KEY:
        required: false
      KIS_APP_SECRET:
        required: false
      KIS_ACCOUNT_NO:
        required: false
      # 키움 secrets (broker=kiwoom 일 때만 사용됨)
      KIWOOM_APP_KEY:
        required: false
      KIWOOM_APP_SECRET:
        required: false
      # LS secrets (broker=ls 일 때만 사용됨)
      LS_APP_KEY:
        required: false
      LS_APP_SECRET:
        required: false
      # 토스 secrets (broker=toss 일 때만 사용됨)
      TOSS_APP_KEY:
        required: false
      TOSS_APP_SECRET:
        required: false
      # 공통 secrets
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      # Finnhub 실시간 시세 fallback (LS 증권 g3101 실패 시)
      FINNHUB_API_KEY:
        required: false

jobs:
  run-trade:
    # 키움/토스 real은 접근 IP 제약으로 self-hosted runner 사용, 나머지는 ubuntu-latest
    runs-on: ${{ ((inputs.broker == 'kiwoom' || inputs.broker == 'toss') && inputs.broker_mode == 'real') && format('{0}-real', inputs.broker) || 'ubuntu-latest' }}
    # GitHub Environments: broker-mode 조합별 secrets/variables 분리
    # 환경 예: kis-demo, kis-real, kiwoom-demo, kiwoom-real, ls-demo, ls-real, toss-real
    environment: ${{ inputs.broker }}-${{ inputs.broker_mode }}
    # 동일 broker-mode 조합의 동시 실행 방지 — .state.json 동시 쓰기 충돌 방지
    concurrency:
      group: trade-${{ inputs.broker }}-${{ inputs.broker_mode }}
      cancel-in-progress: false
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 설정
        run: uv python install

      - name: 의존성 설치
        run: uv sync

      - name: state 캐시 복원
        # 이전 실행에서 저장한 .state.json을 불러옵니다.
        # T값, 사이클 시작일, 복리 시드 등 API로 복구할 수 없는 정보가 담겨 있습니다.
        # 캐시 키: state-{broker}-{mode}-{run_id}
        # 하위호환: KIS 브로커에 한해 기존 state-{mode}-* 캐시도 복원 (KIS 단일 브로커 시절)
        # 주의: 비-KIS 브로커는 KIS state를 물려받지 않도록 KIS 전용 폴백 사용
        id: state-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .state.json
          key: state-${{ inputs.broker }}-${{ inputs.broker_mode }}-${{ github.run_id }}
          restore-keys: |
            state-${{ inputs.broker }}-${{ inputs.broker_mode }}-
            ${{ inputs.broker == 'kis' && format('state-{0}-', inputs.broker_mode) || '_no-legacy_' }}

      - name: Resolve and log inputs
        run: |
          echo "Resolved BROKER=${{ inputs.broker || 'kis' }}"
          echo "Resolved BROKER_MODE=${{ inputs.broker_mode || 'demo' }}"
          echo "Resolved TRADE_MODE=${{ inputs.trade_mode || vars.TRADE_MODE || (inputs.broker_mode == 'real' && 'DRY') || 'LIVE' }}"
          echo "Resolved SYMBOLS=${{ inputs.symbols || vars.SYMBOLS || (inputs.broker == 'kiwoom' && 'TQQQ:NAS,SOXL:NYS') || 'TQQQ:NAS,SOXL:AMS' }}"
          echo "Environment=${{ inputs.broker }}-${{ inputs.broker_mode }}"
          echo "Runner=${{ ((inputs.broker == 'kiwoom' || inputs.broker == 'toss') && inputs.broker_mode == 'real') && format('{0}-real', inputs.broker) || 'ubuntu-latest' }}"

      - name: 자동매매 봇 실행
        env:
          # 브로커 설정 (일반화)
          BROKER: ${{ inputs.broker || 'kis' }}
          BROKER_MODE: ${{ inputs.broker_mode || 'demo' }}

          # KIS 인증정보 (environment에서 주입 — broker=kis 일 때만 값이 있음)
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}

          # 키움 인증정보 (environment에서 주입 — broker=kiwoom 일 때만 값이 있음)
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_APP_SECRET: ${{ secrets.KIWOOM_APP_SECRET }}
          # LS 인증정보 (environment에서 주입 — broker=ls 일 때만 값이 있음)
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}

          # 토스 인증정보 (environment에서 주입 — broker=toss 일 때만 값이 있음)
          TOSS_APP_KEY: ${{ secrets.TOSS_APP_KEY }}
          TOSS_APP_SECRET: ${{ secrets.TOSS_APP_SECRET }}
          TOSS_ACCOUNT_SEQ: ${{ vars.TOSS_ACCOUNT_SEQ }}

          # 런타임 설정: inputs -> environment vars -> 모드별 기본값 순으로 폴백
          # real 환경은 기본 DRY (fail-safe: 명시적으로 LIVE 선택해야 실전 주문)
          # demo 환경은 기본 LIVE (모의 계좌에서 실제 주문 흐름 테스트)
          TRADE_MODE: ${{ inputs.trade_mode || vars.TRADE_MODE || (inputs.broker_mode == 'real' && 'DRY') || 'LIVE' }}
          # 복수 종목: inputs -> environment vars -> config.py 기본값
          SYMBOLS: ${{ inputs.symbols || vars.SYMBOLS }}

          # 종목별 세부 설정 (environment vars에서 주입)
          TQQQ_SPLITS: ${{ vars.TQQQ_SPLITS }}
          TQQQ_SYMBOL_TYPE: ${{ vars.TQQQ_SYMBOL_TYPE }}
          TQQQ_SEED: ${{ vars.TQQQ_SEED }}
          TQQQ_ADDITIONAL_LOC_LEVELS: ${{ vars.TQQQ_ADDITIONAL_LOC_LEVELS }}

          SOXL_SPLITS: ${{ vars.SOXL_SPLITS }}
          SOXL_SYMBOL_TYPE: ${{ vars.SOXL_SYMBOL_TYPE }}
          SOXL_SEED: ${{ vars.SOXL_SEED }}
          SOXL_ADDITIONAL_LOC_LEVELS: ${{ vars.SOXL_ADDITIONAL_LOC_LEVELS }}

          # 글로벌 추가 LOC 단계 (종목별 설정이 없을 때 폴백)
          ADDITIONAL_LOC_LEVELS: ${{ vars.ADDITIONAL_LOC_LEVELS }}

          # 런타임 옵션: inputs -> environment vars -> 코드 기본값
          QUIET_HOURS: ${{ inputs.quiet_hours || vars.QUIET_HOURS || (inputs.broker_mode == 'demo' && 'true') || 'false' }}
          COMMISSION_RATE: ${{ inputs.commission_rate || vars.COMMISSION_RATE || '0.0025' }}
          REINVEST: ${{ inputs.reinvest || vars.REINVEST || 'true' }}

          # 텔레그램 (environment에서 주입 — 브로커+모드별로 다른 채널 가능)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Finnhub 실시간 시세 fallback (LS 증권 g3101 실패 시)
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

          # LS 모의투자 API 버그 우회 (잔고/체결내역 조회 실패 시 빈 결과 반환)
          # ls-demo 환경에서 기본값 true, 나머지는 false
          LS_DEMO_BYPASS_BUGS: ${{ vars.LS_DEMO_BYPASS_BUGS || (inputs.broker == 'ls' && inputs.broker_mode == 'demo' && 'true') || 'false' }}

          # API 연결 타임아웃 (초 단위, 기본값 30초)
          CONNECT_TIMEOUT: 30

          # GitHub Actions에서 Python 출력이 line-by-line으로 표시되도록 버퍼링 해제
          PYTHONUNBUFFERED: 1

        run: uv run python trading_bot.py

      - name: state 캐시 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .state.json
          key: state-${{ inputs.broker }}-${{ inputs.broker_mode }}-${{ github.run_id }}
