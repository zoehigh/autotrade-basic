name: 무한매수법 실행 (LS Demo)

# LS증권 모의투자 계좌 실행
# GitHub Environment: ls-demo (secrets/variables 분리)
# 캐시 키: state-ls-demo-*
# 참고: COSAQ01400(잔고) 지원, COSAQ00102(체결내역)/COSAT00301(주문)은 모의투자 미지원
#       DRY 모드로 전략 검증 후 LIVE 전환 필요

on:
  repository_dispatch:
    types:
      - trigger_trade_ls_demo
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택 (기본: LIVE)'
        required: false
        type: choice
        options:
          - DRY
          - LIVE
      symbols:
        description: '거래 심볼 — 비워두면 환경 변수 SYMBOLS 사용'
        required: false
        type: string

jobs:
  trade_ls_demo:
    uses: ./.github/workflows/trade_base.yml
    with:
      broker: ls
      broker_mode: demo
      trade_mode: ${{ github.event.inputs.trade_mode || github.event.client_payload.trade_mode || '' }}
      symbols: ${{ github.event.inputs.symbols || github.event.client_payload.symbols || '' }}

    secrets: inherit
